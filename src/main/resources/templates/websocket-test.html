<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
    <h2>WebSocket Message Test</h2>
    <input id="token" placeholder="JWT Token" style="width:400px"><br><br>
    <input id="conversationId" placeholder="Conversation ID" value="1"><br><br>
    <input id="message" placeholder="Message" value="Hello!"><br><br>
    <button onclick="connect()">Connect</button>
    <button onclick="sendMessage()">Send Message</button>
    <button onclick="disconnect()">Disconnect</button>
    <pre id="log"></pre>

    <script>
        let stompClient = null;

        function log(msg) {
            document.getElementById('log').innerHTML += msg + '\n';
        }

        function connect() {
            const token = document.getElementById('token').value;
            const socket = new SockJS('http://localhost:8080/ws');
            stompClient = Stomp.over(socket);
            
            stompClient.connect(
                { Authorization: 'Bearer ' + token },
                function(frame) {
                    log('Connected: ' + frame);
                    const convId = document.getElementById('conversationId').value;
                    
                    stompClient.subscribe('/topic/conversation/' + convId, function(message) {
                        log('Received: ' + message.body);
                    });
                    
                    stompClient.subscribe('/user/queue/errors', function(error) {
                        log('Error: ' + error.body);
                    });
                },
                function(error) {
                    log('Connection error: ' + error);
                }
            );
        }

        function sendMessage() {
            const convId = document.getElementById('conversationId').value;
            const msg = document.getElementById('message').value;
            
            stompClient.send('/app/chat.message', 
                { conversationId: convId },
                JSON.stringify({
                    messageType: 'TEXT',
                    content: msg
                })
            );
            log('Sent: ' + msg);
        }

        function disconnect() {
            if (stompClient) {
                stompClient.disconnect();
                log('Disconnected');
            }
        }
    </script>
</body>
</html>
